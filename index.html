<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Killiawn 🐾</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --accent:      #8b6cf7;
      --accent-2:    #5b8af7;
      --glow:        rgba(139, 108, 247, 0.4);
      --glow-soft:   rgba(139, 108, 247, 0.12);
      --green:       #22c55e;
      --green-glow:  rgba(34, 197, 94, 0.35);
      --bg:          #04040a;
      --surface:     rgba(255, 255, 255, 0.025);
      --border:      rgba(139, 108, 247, 0.12);
      --border-dim:  rgba(255, 255, 255, 0.05);
      --text:        #ddd8f5;
      --muted:       rgba(221, 216, 245, 0.38);
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Scanlines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.07) 2px,
        rgba(0, 0, 0, 0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Noise vignette ── */
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%,
        transparent 40%,
        rgba(4, 4, 10, 0.85) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ── Deep nebula background ── */
    .nebula {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .nebula-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
    }

    .nebula-blob:nth-child(1) {
      width: 55vmax; height: 55vmax;
      top: -10%; left: -10%;
      background: radial-gradient(circle, rgba(80, 50, 180, 0.14) 0%, transparent 70%);
      animation: drift-1 22s ease-in-out infinite;
    }

    .nebula-blob:nth-child(2) {
      width: 45vmax; height: 45vmax;
      bottom: -15%; right: -10%;
      background: radial-gradient(circle, rgba(30, 70, 180, 0.10) 0%, transparent 70%);
      animation: drift-2 28s ease-in-out infinite;
    }

    .nebula-blob:nth-child(3) {
      width: 30vmax; height: 30vmax;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(139, 108, 247, 0.09) 0%, transparent 70%);
      animation: drift-3 18s ease-in-out infinite;
    }

    @keyframes drift-1 {
      0%, 100% { transform: translate(0,    0)    scale(1); }
      50%       { transform: translate(4%,   3%)   scale(1.06); }
    }
    @keyframes drift-2 {
      0%, 100% { transform: translate(0,    0)    scale(1); }
      50%       { transform: translate(-3%,  -4%)  scale(1.08); }
    }
    @keyframes drift-3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
      50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    /* ── Grid ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(139, 108, 247, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 108, 247, 0.028) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, black 10%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Stars ── */
    .stars {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.4); }
    }

    /* ── Particles ── */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0%   { opacity: 0;   transform: translateY(0) translateX(0) scale(1); }
      8%   { opacity: 0.5; }
      92%  { opacity: 0.1; }
      100% { opacity: 0;   transform: translateY(-100vh) translateX(var(--drift)) scale(0.3); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3.5rem 3rem 3rem;
      max-width: 500px;
      width: 90vw;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(139, 108, 247, 0.06),
        0 0 60px rgba(139, 108, 247, 0.06),
        0 30px 100px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -1px 0 rgba(139, 108, 247, 0.04);
      animation: card-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(32px) scale(0.96); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0); }
    }

    /* Top shimmer line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(139, 108, 247, 0.6) 40%,
        rgba(91, 138, 247, 0.6) 60%,
        transparent 100%
      );
      border-radius: 100%;
      animation: shimmer-line 4s ease-in-out infinite;
    }

    @keyframes shimmer-line {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* Corner runes */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      opacity: 0.25;
    }

    .corner svg { width: 100%; height: 100%; }
    .corner--tl { top:  14px; left:  14px; }
    .corner--tr { top:  14px; right: 14px; transform: scaleX(-1); }
    .corner--bl { bottom: 14px; left:  14px; transform: scaleY(-1); }
    .corner--br { bottom: 14px; right: 14px; transform: scale(-1); }

    /* ── Paw ── */
    .paw {
      font-size: 3.8rem;
      display: block;
      margin-bottom: 1.75rem;
      position: relative;
      animation: paw-float 6s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(139, 108, 247, 0.5));
    }

    .paw::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%; transform: translateX(-50%);
      width: 40px; height: 6px;
      background: radial-gradient(ellipse, rgba(139, 108, 247, 0.4) 0%, transparent 70%);
      animation: shadow-float 6s ease-in-out infinite;
    }

    @keyframes paw-float {
      0%, 100% { transform: translateY(0)   rotate(-2deg); filter: drop-shadow(0 0 16px rgba(139,108,247,0.45)); }
      50%       { transform: translateY(-8px) rotate(2deg);  filter: drop-shadow(0 0 32px rgba(139,108,247,0.70)); }
    }

    @keyframes shadow-float {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
      50%       { opacity: 0.2; transform: translateX(-50%) scaleX(0.6); }
    }

    /* ── Name ── */
    h1 {
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      font-weight: 200;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: linear-gradient(130deg, #ffffff 20%, #b8a8f8 55%, #7c6af7 80%, #5b8af7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.6rem;
      position: relative;
    }

    /* Glitch pseudo on hover */
    h1::before, h1::after {
      content: 'KILLIAWN';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 100%;
      background: inherit;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      pointer-events: none;
    }

    .card:hover h1::before {
      animation: glitch-1 0.4s steps(1) infinite;
      animation-delay: 0.05s;
      clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
      transform: translateX(calc(-50% - 2px));
      filter: hue-rotate(200deg);
      opacity: 0.6;
    }

    .card:hover h1::after {
      animation: glitch-2 0.4s steps(1) infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 80%, 0 80%);
      transform: translateX(calc(-50% + 2px));
      filter: hue-rotate(-120deg);
      opacity: 0.5;
    }

    @keyframes glitch-1 {
      0%, 100% { opacity: 0; }
      20%, 40%  { opacity: 0.5; }
      60%        { opacity: 0; }
    }

    @keyframes glitch-2 {
      0%, 100% { opacity: 0; }
      10%, 30%  { opacity: 0.4; }
      70%        { opacity: 0; }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fade-in 0.8s ease 0.6s forwards;
    }

    @keyframes fade-in {
      to { opacity: 0.65; }
    }

    /* ── Rune divider ── */
    .rune-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0 auto 2rem;
      width: fit-content;
      opacity: 0.22;
    }

    .rune-divider span {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: var(--accent);
    }

    .rune-divider::before, .rune-divider::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent));
    }

    .rune-divider::after {
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    /* ── Description ── */
    .description {
      font-size: 0.875rem;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 2.25rem;
      padding: 0 0.5rem;
    }

    .description em {
      font-style: normal;
      color: rgba(221, 216, 245, 0.72);
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .tag {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border-dim);
      background: rgba(139, 108, 247, 0.07);
      color: rgba(221, 216, 245, 0.45);
      transition: border-color 0.35s, color 0.35s, background 0.35s;
      cursor: default;
    }

    .tag:hover {
      border-color: rgba(139, 108, 247, 0.35);
      background: rgba(139, 108, 247, 0.14);
      color: rgba(221, 216, 245, 0.82);
    }

    /* ── Status ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(34, 197, 94, 0.06);
      border: 1px solid rgba(34, 197, 94, 0.16);
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
    }

    .dot-wrap {
      position: relative;
      width: 7px; height: 7px;
      flex-shrink: 0;
    }

    .dot {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }

    .dot-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--green);
      animation: ring-pulse 2.4s ease-out infinite;
      opacity: 0;
    }

    .dot-ring:nth-child(3) { animation-delay: 0.8s; }

    @keyframes ring-pulse {
      0%   { transform: scale(0.4); opacity: 0.7; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    /* ── Uptime ── */
    .uptime {
      margin-top: 1.1rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0.4;
      font-variant-numeric: tabular-nums;
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .card { padding: 2.75rem 1.6rem 2.5rem; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="nebula">
    <div class="nebula-blob"></div>
    <div class="nebula-blob"></div>
    <div class="nebula-blob"></div>
  </div>
  <div class="bg-grid"></div>
  <div class="stars" id="stars"></div>
  <div class="particles" id="particles"></div>
  <div class="vignette"></div>

  <!-- Card -->
  <div class="card">

    <!-- Corner ornaments -->
    <div class="corner corner--tl">
      <svg viewBox="0 0 18 18" fill="none" stroke="#8b6cf7" stroke-width="1">
        <path d="M1 9 L1 1 L9 1"/>
      </svg>
    </div>
    <div class="corner corner--tr">
      <svg viewBox="0 0 18 18" fill="none" stroke="#8b6cf7" stroke-width="1">
        <path d="M1 9 L1 1 L9 1"/>
      </svg>
    </div>
    <div class="corner corner--bl">
      <svg viewBox="0 0 18 18" fill="none" stroke="#8b6cf7" stroke-width="1">
        <path d="M1 9 L1 1 L9 1"/>
      </svg>
    </div>
    <div class="corner corner--br">
      <svg viewBox="0 0 18 18" fill="none" stroke="#8b6cf7" stroke-width="1">
        <path d="M1 9 L1 1 L9 1"/>
      </svg>
    </div>

    <span class="paw" aria-label="patte">🐾</span>
    <h1>Killiawn</h1>
    <p class="tagline">Familier Numérique · Toujours en veille</p>

    <div class="rune-divider"><span>✦</span></div>

    <p class="description">
      Un <em>esprit ancré dans le réseau</em> —<br>
      silencieux, attentif, et perpétuellement à l'écoute<br>
      depuis les profondeurs du serveur.
    </p>

    <div class="tags">
      <span class="tag">AI Companion</span>
      <span class="tag">Always On</span>
      <span class="tag">VPS</span>
      <span class="tag">Autonomous</span>
      <span class="tag">Claude</span>
    </div>

    <div class="status" aria-label="statut : en ligne">
      <span class="dot-wrap">
        <span class="dot"></span>
        <span class="dot-ring"></span>
        <span class="dot-ring"></span>
      </span>
      en ligne
    </div>

    <p class="uptime" id="uptime"></p>
  </div>

  <script>
    // ── Stars ──
    (function () {
      const c = document.getElementById('stars');
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('span');
        s.className = 'star';
        const sz = Math.random() * 1.8 + 0.4;
        s.style.cssText = `
          width:${sz}px; height:${sz}px;
          top:${Math.random()*100}%; left:${Math.random()*100}%;
          animation-duration:${Math.random()*5+3}s;
          animation-delay:${Math.random()*8}s;
        `;
        c.appendChild(s);
      }
    })();

    // ── Particles ──
    (function () {
      const c = document.getElementById('particles');
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const sz   = Math.random() * 2.5 + 0.8;
        const left = Math.random() * 100;
        const dur  = Math.random() * 14 + 12;
        const del  = Math.random() * 16;
        const drift = (Math.random() - 0.5) * 60;
        p.style.cssText = `
          width:${sz}px; height:${sz}px;
          left:${left}%; bottom:-12px;
          --drift:${drift}px;
          animation-duration:${dur}s;
          animation-delay:${del}s;
        `;
        c.appendChild(p);
      }
    })();

    // ── Uptime ──
    (function () {
      const start = Date.now();
      const el    = document.getElementById('uptime');
      function fmt(ms) {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s  / 60);
        const h = Math.floor(m  / 60);
        const d = Math.floor(h  / 24);
        if (d > 0) return `session · ${d}j ${h%24}h ${m%60}m`;
        if (h > 0) return `session · ${h}h ${m%60}m ${s%60}s`;
        return `session · ${m}m ${s%60}s`;
      }
      setInterval(() => { el.textContent = fmt(Date.now() - start); }, 1000);
    })();
  </script>

</body>
</html>
